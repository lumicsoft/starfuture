<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tx History | PRO MAX</title>

    <link rel="stylesheet" href="style1.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Specific Styles for History Page */
        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #666; padding: 12px 24px; border-radius: 16px;
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            transition: all 0.4s ease;
        }
        
        .filter-btn.active {
            background: #FFD700;
            color: black;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.4);
        }

        .history-inner {
            position: relative;
            margin: 2px;
            background: #080810; /* Matching dashboard panel-bg */
            border-radius: 22px;
            padding: 20px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="pt-28 pb-32">

    <main class="max-w-4xl mx-auto px-6 relative z-10">
        
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black orbitron italic uppercase tracking-tighter">
                TX <span class="text-yellow-500">HISTORY</span>
            </h1>
            <p class="text-gray-600 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 italic">Official Contract Ledger</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button onclick="showHistory('deposit')" id="btn-deposit" class="filter-btn active">Deposits</button>
            <button onclick="showHistory('compounding')" id="btn-compounding" class="filter-btn">Reinvest Capital</button>
            <button onclick="showHistory('income')" id="btn-income" class="filter-btn">Income</button>
            <button onclick="showHistory('withdrawal')" id="btn-withdrawal" class="filter-btn">Withdrawals</button>
        </div>

        <div id="history-container" class="grid gap-6">
            <div class="text-center py-20 opacity-30">
                <div class="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="orbitron text-[10px] tracking-widest uppercase">Syncing Ledger...</p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script>
    <script src="web3-handler.js"></script>
    <script>
   <script>
    async function showHistory(category) {
        const container = document.getElementById('history-container');
        const buttons = document.querySelectorAll('.filter-btn');
        
        buttons.forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + category);
        if(activeBtn) activeBtn.classList.add('active');

        container.innerHTML = `<div class="text-center py-20"><p class="orbitron text-[10px] text-gray-600 animate-pulse uppercase tracking-widest">Accessing Blockchain...</p></div>`;

        try {
            // --- TRUST WALLET FIX: Signer check ---
            // Agar window.signer nahi hai, toh check karein window.ethereum hai ya nahi
            let activeSigner = window.signer;
            if (!activeSigner && window.ethereum) {
                const tempProvider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await tempProvider.listAccounts();
                if (accounts.length > 0) {
                    activeSigner = tempProvider.getSigner();
                }
            }

            if (!activeSigner) {
                // Agar abhi bhi nahi hai, toh 1 second baad phir try karein
                setTimeout(() => showHistory(category), 1000);
                return;
            }

            const typeMapForBackend = {
                'deposit': ['DEPOSIT'],
                'compounding': ['REINVEST'],
                'withdrawal': ['WITHDRAW', 'PRINCIPAL_WITHDRAW'],
                'income': ['ROI_INCOME', 'LEVEL_INCOME', 'RANK_INCOME']
            };

            // Signer ko fetch function mein pass karein agar zaroorat ho (web3-handler.js ke hisab se)
            const logs = await window.fetchBlockchainHistory(typeMapForBackend[category]);

            if(!logs || logs.length === 0) {
                container.innerHTML = `<div class="text-center py-20 border border-dashed border-white/5 rounded-[40px]"><p class="text-gray-600 text-[10px] font-bold orbitron uppercase tracking-widest">No ${category} transactions found</p></div>`;
                return;
            }

            let html = '';
            logs.forEach(item => {
                const isPositive = !item.type.includes('WITHDRAW');
                const displayType = item.type.replace('_', ' ');

                html += `
                <div class="premium-card mb-4"> 
                    <div class="history-inner">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10">
                                <i data-lucide="${getIcon(category)}" class="w-5 h-5 ${isPositive ? 'text-yellow-500' : 'text-red-500'}"></i>
                            </div>
                            <div>
                                <p class="text-[11px] font-black orbitron text-white tracking-tighter uppercase">${displayType}</p>
                                <p class="text-[9px] font-bold text-gray-400 mt-1 uppercase">${item.detail || ''}</p>
                                <p class="text-[8px] font-medium text-gray-600 mt-0.5 uppercase">${item.date} | ${item.time}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl orbitron text-white font-black">
                                <span class="text-sm text-yellow-600 font-bold mr-0.5">$</span>${item.amount}
                            </div>
                            <p class="text-[8px] text-gray-600 font-bold uppercase tracking-[0.2em] mt-1 italic">Verified TX</p>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            lucide.createIcons();

        } catch (err) {
            console.error("History Error:", err);
            container.innerHTML = `<div class="text-center py-20 text-red-500 orbitron text-[10px]">WEB3 ERROR: RETRYING...</div>`;
            setTimeout(() => showHistory(category), 2000);
        }
    }

    function getIcon(category) {
        const map = { 'deposit': 'arrow-down-left', 'compounding': 'refresh-cw', 'income': 'trending-up', 'withdrawal': 'external-link' };
        return map[category] || 'circle';
    }

    // Auto-init on load with better Trust Wallet detection
    window.addEventListener('load', () => {
        let retryCount = 0;
        const checkInit = setInterval(() => {
            retryCount++;
            // Check if contract is ready
            if (window.contract) {
                showHistory('deposit');
                clearInterval(checkInit);
            }
            // 5 second baad agar nahi hota toh manual call
            if (retryCount > 10) clearInterval(checkInit);
        }, 500);
    });
</script>
</body>

</html>
