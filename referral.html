<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Report - Pro Max</title>

    <link rel="stylesheet" href="style1.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="p-4 md:p-10">

    <main class="max-w-7xl mx-auto space-y-6 relative z-10">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5">
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="users" class="text-green-500 w-6 h-6"></i><p class="label-text">Referral</p></div>
                <h3 class="amount-text orbitron" id="direct-count">0</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="network" class="text-emerald-500 w-6 h-6"></i><p class="label-text">Total Team</p></div>
                <h3 class="amount-text orbitron" id="team-count">0</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="banknote" class="text-yellow-600 w-6 h-6"></i><p class="label-text">Earned</p></div>
                <h3 class="amount-text orbitron"><span id="total-earned">0.00</span></h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="user-plus" class="text-yellow-500 w-6 h-6"></i><p class="label-text">Direct</p></div>
                <h3 class="amount-text orbitron" id="direct-earnings">0.00</h3>
            </div></div>

            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="layers" class="text-purple-500 w-6 h-6"></i><p class="label-text">Level</p></div>
                <h3 class="amount-text orbitron" id="level-earnings">0.00</h3>
            </div></div>
        </div>

        <div class="premium-card">
            <div class="inner-content !block py-8">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                    <h3 class="text-sm font-black orbitron uppercase italic text-yellow-500">Team Report</h3>
                    
                    <div class="flex items-center gap-3 bg-black/50 p-2 px-4 rounded-xl border border-white/10">
                        <span class="label-text">Select Level:</span>
                        <select id="levelSelect" onchange="loadLevelData(this.value)" class="bg-transparent text-yellow-500 font-black orbitron text-xs outline-none cursor-pointer">
                            <script>for(let i=1; i<=15; i++) document.write(`<option value="${i}">Level ${i}</option>`);</script>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="luxury-table">
                        <thead>
                            <tr>
                                <th>USER ADDRESS</th>
                                <th>LEVEL</th>
                                <th>TOTAL DEPOSIT</th>
                                <th>TEAM VOLUME</th>
                                <th>STATUS</th>
                                <th>JOIN DATE</th>
                            </tr>
                        </thead>
                        <tbody id="team-table-body" class="text-gray-400">
                            <tr><td colspan="6" class="p-10 text-center italic text-gray-600">Syncing Network...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script> 
    <script src="web3-handler.js"></script>
    
 <script>
    lucide.createIcons();

    const format = (val) => {
        try { 
            if(!val) return "0.00";
            return parseFloat(ethers.utils.formatUnits(val, 18)).toFixed(2); 
        } catch (e) { return "0.00"; }
    };

    // --- DATA LOADING LOGIC ---
    async function loadTeamData() {
        // window.contract check kar raha hai jo web3-handler.js se aayega
        const activeContract = window.contract;
        const activeSigner = window.signer;

        if (!activeContract || !activeSigner) {
            console.log("Waiting for Web3 Handler...");
            setTimeout(loadTeamData, 1000);
            return;
        }

        try {
            const address = await activeSigner.getAddress();
            
            // 1. Stats Load karein (Aapke getUserBasicStats aur getMatrixIncomeReport se)
            const [basic, matrix] = await Promise.all([
                activeContract.getUserBasicStats(address),
                activeContract.getMatrixIncomeReport(address)
            ]);

            // UI Update (Ids match karke)
            if(document.getElementById('direct-count')) document.getElementById('direct-count').innerText = basic[1].toString(); // directs
            if(document.getElementById('team-count')) document.getElementById('team-count').innerText = basic[0].toString(); // team
            if(document.getElementById('total-earned')) document.getElementById('total-earned').innerText = format(basic[2]); // totalEarned
            if(document.getElementById('direct-earnings')) document.getElementById('direct-earnings').innerText = format(matrix[0]); // dMagic
            if(document.getElementById('level-earnings')) document.getElementById('level-earnings').innerText = format(matrix[1]); // c1

            // Default Level 1 load karein
            loadLevelMembers(1);

        } catch (err) {
            console.error("Team Data Load Error:", err);
        }
    }

    async function loadLevelMembers(level) {
        const tableBody = document.getElementById('team-table-body');
        if(!tableBody) return;

        tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-yellow-500 orbitron animate-pulse">FETCHING LEVEL ${level}...</td></tr>`;
        
        try {
            const address = await window.signer.getAddress();
            // Aapke code se function: getLevelTeam
            const members = await window.contract.getLevelTeam(address, level);

            if (!members || members.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-600 py-20 italic">LEVEL ${level} IS EMPTY</td></tr>`;
                return;
            }

            let html = '';
            for (let i = 0; i < members.length; i++) {
                const mAddr = members[i];
                html += `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                    <td class="py-4 font-mono text-blue-400 text-xs">${mAddr.substring(0,12)}...${mAddr.substring(34)}</td>
                    <td class="text-gray-400 font-bold">Lvl ${level}</td>
                    <td class="text-white font-black text-xs">15.00 USDT</td>
                    <td class="text-gray-500">---</td>
                    <td><span class="text-green-500 text-[10px] font-bold border border-green-500/20 px-2 py-1 bg-green-500/5">ACTIVE</span></td>
                    <td class="text-gray-500 font-mono text-[10px]">VERIFIED</td>
                </tr>`;
            }
            tableBody.innerHTML = html;
        } catch (err) { 
            console.error("Level Fetch Error:", err);
            tableBody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-red-500">CONTRACT SYNC ERROR</td></tr>`; 
        }
    }

    // Level select change hone par call hoga
    window.loadLevelData = function(level) {
        loadLevelMembers(level);
    }

    // Start
    window.addEventListener('load', loadTeamData);
</script>
</body>


</html>
